version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql_sistema_automotivo
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: sistema_automotivo
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: